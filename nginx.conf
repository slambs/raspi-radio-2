server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header Cache-Control "no-store";

    # serve static assets directly — never fall back to index.html for these
    location ~* \.(js|css|svg|json|ttf|png|jpg|ico|woff|woff2)$ {
        types {
            application/javascript  js;
            text/css                css;
            image/svg+xml           svg;
            application/json        json;
            font/ttf                ttf;
        }
        try_files $uri =404;
    }

    # SPA fallback only for navigation routes
    location / {
        try_files $uri /index.html;
    }
}
