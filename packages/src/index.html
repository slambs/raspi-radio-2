<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspi Radio</title>

    <script src="index.js" async></script>

    <link rel="stylesheet" href="index.css" />
</head>

<body>

    <div class="AppWrapper">
        <nav>
            <a class="navbarItemClock" href="/">
                🕛
            </a>
            <a class="navbarItemRadio" href="/Radio">
                📻
            </a>
            <a class="navbarItemSettings" href="/Settings">
                ⛭
            </a>
        </nav>

        <!-- clock -->
        <div id="largeClock" class="largeClock" hidden>00:00:00</div>

        <!-- radio -->
        <div class="radio">
            <h4>Kiss 88.9</h4>
            <audio controls>
                <source src="https://stream.radiojar.com/64p6ktzntg0uv" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>

        <!-- settings -->
        <div id="settings"></div>
    </div>





</body>



</html>
