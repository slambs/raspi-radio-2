<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raspi Radio</title>

    <script src="./app.js" defer type="module"></script>

    <link rel="stylesheet" href="./style.css" />
</head>

<body>

    <!-- navigation -->
    <div class="AppWrapper">
        <nav>
            <a class="navlink navbarItemClock" href="/">
                <img src="./data/images/clock_icon.svg" />
            </a>
            <a class="navlink navbarItemRadio" href="/radio">
                <img src="./data/images/radio_icon.svg" />
            </a>
            <a class=" navlink navbarItemSettings" href="/settings">
                <img src="./data/images/settings_icon.svg" />
            </a>
        </nav>


        <main>
        </main>

        <!-- clock -->
        <div id="largeClock" class="largeClock">00:00:00</div>

        <!-- radio -->
        <template>
            <div class="radio" hidden>
                <h4>Kiss 88.9</h4>
                <audio controls>
                    <source src="https://stream.radiojar.com/64p6ktzntg0uv" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            </div>
        </template>



        <!-- settings -->
        <template>
            <div id="settings"></div>
        </template>
    </div>





</body>



</html>
